# Issue template chooser configuration.
# Docs: https://docs.github.com/communities/using-templates-to-encourage-useful-issues-and-pull-requests/configuring-issue-templates-for-your-repository

# Keep the "Open a blank issue" option available for anything that doesn't fit
# the Bug report / Feature request templates.
blank_issues_enabled: true

contact_links:
  - name: 💬 Questions & ideas (Discussions)
    url: https://github.com/<your-username>/ubuntu-setup/discussions
    about: Ask a question, share how you use ubuntu-setup, or propose a new module before filing an issue.
  - name: 🔐 Report a security issue
    url: https://github.com/<your-username>/ubuntu-setup/blob/main/SECURITY.md
    about: Please follow our responsible disclosure process instead of opening a public issue.
