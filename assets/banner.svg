<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="ubuntu-setup — friendly and safe Ubuntu setup script">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1b1f"/>
      <stop offset="1" stop-color="#0e0e11"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E95420"/>
      <stop offset="1" stop-color="#ff7a45"/>
    </linearGradient>
    <style>
      .title { font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-weight: 700; }
      .tag   { font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-weight: 400; }
      .mono  { font-family: "DejaVu Sans Mono", "Courier New", monospace; font-weight: 400; }
      .chip  { font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-weight: 600; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="6" fill="url(#accent)"/>

  <!-- Logo mark: shield with check (safe-by-default) -->
  <g transform="translate(96,84)">
    <path d="M76 0 L150 26 V78 C150 124 116 150 76 164 C36 150 2 124 2 78 V26 Z"
          fill="none" stroke="url(#accent)" stroke-width="7" stroke-linejoin="round"/>
    <circle cx="76" cy="80" r="48" fill="#E95420" opacity="0.12"/>
    <path d="M48 82 L68 102 L108 58" fill="none" stroke="url(#accent)" stroke-width="11"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(300,0)">
    <text class="title" x="0" y="140" font-size="76" fill="#ffffff">ubuntu<tspan fill="#E95420">-</tspan>setup</text>
    <text class="tag" x="2" y="190" font-size="29" fill="#c9c9d1">Friendly &amp; safe Ubuntu setup — server + desktop</text>

    <!-- Feature chips -->
    <g transform="translate(2,222)">
      <g>
        <rect x="0" y="0" rx="16" ry="16" width="156" height="34" fill="#26262c" stroke="#3a3a42" stroke-width="1"/>
        <text class="chip" x="20" y="23" font-size="16" fill="#E95420">safe by default</text>
      </g>
      <g transform="translate(170,0)">
        <rect x="0" y="0" rx="16" ry="16" width="132" height="34" fill="#26262c" stroke="#3a3a42" stroke-width="1"/>
        <text class="chip" x="20" y="23" font-size="16" fill="#dcdce2">--dry-run</text>
      </g>
      <g transform="translate(316,0)">
        <rect x="0" y="0" rx="16" ry="16" width="142" height="34" fill="#26262c" stroke="#3a3a42" stroke-width="1"/>
        <text class="chip" x="20" y="23" font-size="16" fill="#dcdce2">no lock-outs</text>
      </g>
      <g transform="translate(472,0)">
        <rect x="0" y="0" rx="16" ry="16" width="118" height="34" fill="#26262c" stroke="#3a3a42" stroke-width="1"/>
        <text class="chip" x="20" y="23" font-size="16" fill="#dcdce2">open source</text>
      </g>
    </g>
  </g>

  <!-- Terminal motif (right) -->
  <g transform="translate(940,96)">
    <rect x="0" y="0" rx="12" ry="12" width="248" height="148" fill="#121216" stroke="#34343c" stroke-width="1.5"/>
    <rect x="0" y="0" rx="12" ry="12" width="248" height="30" fill="#26262c"/>
    <circle cx="20" cy="15" r="5" fill="#E95420"/>
    <circle cx="40" cy="15" r="5" fill="#5a5a64"/>
    <circle cx="60" cy="15" r="5" fill="#5a5a64"/>
    <text class="mono" x="18" y="64" font-size="15" fill="#7fd47f">$ ./setup.sh --dry-run</text>
    <text class="mono" x="18" y="92" font-size="15" fill="#c9c9d1">==&gt; Firewall (UFW)</text>
    <text class="mono" x="18" y="116" font-size="15" fill="#c9c9d1">==&gt; SSH hardening</text>
    <text class="mono" x="18" y="140" font-size="15" fill="#E95420">==&gt; ready ✓</text>
  </g>

  <text class="mono" x="300" y="296" font-size="15" fill="#6d6d77">MIT licensed · Ubuntu 22.04 &amp; 24.04 LTS · amd64 / arm64</text>
</svg>
